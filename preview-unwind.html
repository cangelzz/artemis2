<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Spiral Unwind Preview</title>
<style>
body { background: #111; color: #ccc; font-family: monospace; margin: 20px; }
h1 { color: #ff8844; }
canvas { border: 1px solid #333; margin: 5px; }
.row { display: flex; flex-wrap: wrap; gap: 10px; }
.cell { text-align: center; }
.cell p { font-size: 11px; color: #888; margin: 4px 0; }
</style>
</head>
<body>
<h1>Spiral → Outbound: Unwind Approach</h1>
<p>Instead of spiral + separate Hermite, the spiral gradually opens up.<br>
After 1.78 rev, extra "unwind" points have increasing radius, smoothly becoming a line toward Moon.</p>
<div class="row" id="variants"></div>

<script>
const ER = 1, MD = 40, HA = 4, INCL = 28.5 * Math.PI / 180, LR = 4, OFF = 2;
const leoR = ER + 0.08, hSM = (ER+0.3+HA)/2, hE = (HA-ER-0.3)/(HA+ER+0.3);

function build(unwindPts, unwindMaxR, extraAngle) {
  const pts = [];
  // Spiral
  const spiralAngle = 1.78 * 2 * Math.PI;
  for (let i = 0; i < 120; i++) {
    const f = i / 119;
    const a = f * spiralAngle;
    const bl = 1/(1+Math.exp(-(f-0.3)/0.12));
    const hl = (f-0.3)*spiralAngle;
    const rH = hSM*(1-hE*hE)/(1+hE*Math.cos(hl));
    const r = leoR + (rH-leoR)*bl;
    pts.push({ x: Math.cos(a)*r, z: Math.sin(a)*r*Math.cos(INCL) });
  }
  
  // Unwind: continue the spiral but radius grows exponentially
  // angle continues past spiralAngle for extraAngle more radians
  const spiralEndR = 1.7; // approx radius at spiral end
  for (let i = 1; i <= unwindPts; i++) {
    const f = i / unwindPts; // 0→1
    const a = spiralAngle + f * extraAngle;
    // Radius: exponential growth from spiralEndR to unwindMaxR
    const r = spiralEndR + (unwindMaxR - spiralEndR) * (Math.exp(3*f)-1)/(Math.exp(3)-1);
    const x = Math.cos(a) * r;
    const z = Math.sin(a) * r * Math.cos(INCL);
    pts.push({ x, z });
  }
  
  // Outbound: from last unwind point to flyby entry
  const last = pts[pts.length-1];
  const flybyEntry = { x: MD, z: +LR };
  for (let i = 1; i < 40; i++) {
    const t = i / 40;
    const x = last.x + (flybyEntry.x - last.x) * t;
    let z = last.z + (flybyEntry.z - last.z) * t;
    z -= OFF * Math.sin(Math.PI * t);
    pts.push({ x, z });
  }
  
  return pts;
}

function draw(container, label, unwindPts, unwindMaxR, extraAngle) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  const canvas = document.createElement('canvas');
  canvas.width = 500; canvas.height = 300;
  const ctx = canvas.getContext('2d');
  
  const pts = build(unwindPts, unwindMaxR, extraAngle);
  
  const xMin = -6, xMax = 48, zMin = -8, zMax = 8;
  function toC(pt) {
    return {
      cx: (pt.x - xMin) / (xMax - xMin) * canvas.width,
      cy: canvas.height - (pt.z - zMin) / (zMax - zMin) * canvas.height,
    };
  }
  
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=0.5;
  for(let x=xMin;x<=xMax;x+=5){const{cx}=toC({x,z:0});ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,canvas.height);ctx.stroke();}
  
  const e=toC({x:0,z:0});
  ctx.beginPath();ctx.arc(e.cx,e.cy,(ER/(xMax-xMin))*canvas.width,0,Math.PI*2);ctx.fillStyle='#224488';ctx.fill();
  const m=toC({x:MD,z:0});
  ctx.beginPath();ctx.arc(m.cx,m.cy,3,0,Math.PI*2);ctx.fillStyle='#999';ctx.fill();
  
  // Draw: spiral=green, unwind=yellow, outbound=orange
  const spiralEnd = 120;
  const unwindEnd = spiralEnd + unwindPts;
  
  ctx.strokeStyle='#44cc6688';ctx.lineWidth=1;ctx.beginPath();
  for(let i=0;i<spiralEnd&&i<pts.length;i++){const{cx,cy}=toC(pts[i]);i===0?ctx.moveTo(cx,cy):ctx.lineTo(cx,cy);}
  ctx.stroke();
  
  ctx.strokeStyle='#cccc44';ctx.lineWidth=1.5;ctx.beginPath();
  for(let i=spiralEnd;i<unwindEnd&&i<pts.length;i++){const{cx,cy}=toC(pts[i]);i===spiralEnd?ctx.moveTo(cx,cy):ctx.lineTo(cx,cy);}
  ctx.stroke();
  
  ctx.strokeStyle='#ff8844';ctx.lineWidth=1.5;ctx.beginPath();
  for(let i=unwindEnd;i<pts.length;i++){const{cx,cy}=toC(pts[i]);i===unwindEnd?ctx.moveTo(cx,cy):ctx.lineTo(cx,cy);}
  ctx.stroke();
  
  cell.appendChild(canvas);
  const p=document.createElement('p');
  p.innerHTML=`<b>${label}</b><br>unwind=${unwindPts}pts maxR=${unwindMaxR} extra=${(extraAngle*180/Math.PI).toFixed(0)}°`;
  cell.appendChild(p);
  container.appendChild(cell);
}

const c = document.getElementById('variants');

// Vary extra angle (how far the spiral continues unwinding)
draw(c, 'A: no unwind (current)', 0, 2, 0);
draw(c, 'B: 20° unwind, maxR=5', 10, 5, 20*Math.PI/180);
draw(c, 'C: 30° unwind, maxR=8', 15, 8, 30*Math.PI/180);
draw(c, 'D: 40° unwind, maxR=12', 20, 12, 40*Math.PI/180);
draw(c, 'E: 50° unwind, maxR=15', 20, 15, 50*Math.PI/180);
draw(c, 'F: 60° unwind, maxR=20', 25, 20, 60*Math.PI/180);

// Less aggressive radius growth
draw(c, 'G: 40° maxR=8', 20, 8, 40*Math.PI/180);
draw(c, 'H: 50° maxR=10', 20, 10, 50*Math.PI/180);
draw(c, 'I: 60° maxR=12', 25, 12, 60*Math.PI/180);
draw(c, 'J: 45° maxR=10', 20, 10, 45*Math.PI/180);

// More unwind points for smoother curve
draw(c, 'K: 50° maxR=12 40pts', 40, 12, 50*Math.PI/180);
draw(c, 'L: 60° maxR=15 40pts', 40, 15, 60*Math.PI/180);
draw(c, 'M: 45° maxR=8 30pts', 30, 8, 45*Math.PI/180);
draw(c, 'N: 50° maxR=10 30pts', 30, 10, 50*Math.PI/180);
draw(c, 'O: 40° maxR=10 30pts', 30, 10, 40*Math.PI/180);
draw(c, 'P: 35° maxR=8 25pts', 25, 8, 35*Math.PI/180);
</script>
</body>
</html>
