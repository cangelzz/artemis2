<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Orbital Plane Orientation Preview</title>
<style>
body { background: #111; color: #ccc; font-family: monospace; margin: 20px; }
h1 { color: #ff8844; }
canvas { border: 1px solid #333; margin: 5px; }
.row { display: flex; flex-wrap: wrap; gap: 10px; }
.cell { text-align: center; }
.cell p { font-size: 11px; color: #888; margin: 4px 0; }
</style>
</head>
<body>
<h1>Orbital Plane Orientation — Full Trajectory</h1>
<p>Top-down view. Varying how "wide" the Earth orbits look vs how they connect to the outbound line.</p>
<div class="row" id="variants"></div>

<script>
const ER=1, MD=40, HA=4, LR=4, OFF=2;
const leoR=ER+0.08, hSM=(ER+0.3+HA)/2, hE=(HA-ER-0.3)/(HA+ER+0.3);

function build(e1x,e1z, e2x,e2z, rev, outChord, arrChord) {
  const pts = [];
  const totalAngle = rev * 2 * Math.PI;
  
  // Spiral
  for (let i = 0; i < 120; i++) {
    const f = i/119, a = f*totalAngle;
    const bl = 1/(1+Math.exp(-(f-0.3)/0.12));
    const hl = (f-0.3)*totalAngle;
    const rH = hSM*(1-hE*hE)/(1+hE*Math.cos(hl));
    const r = leoR + (rH-leoR)*bl;
    pts.push({ x: Math.cos(a)*e1x*r + Math.sin(a)*e2x*r, z: Math.cos(a)*e1z*r + Math.sin(a)*e2z*r, type:'spiral' });
  }
  
  // Hermite outbound
  const se = pts[pts.length-1];
  const fe = { x: MD, z: LR };
  const endA = rev * 2 * Math.PI;
  const tx = -Math.sin(endA)*e1x + Math.cos(endA)*e2x;
  const tz = -Math.sin(endA)*e1z + Math.cos(endA)*e2z;
  const tLen = Math.sqrt(tx*tx+tz*tz);
  const tang = { x:tx/tLen, z:tz/tLen };
  const arr = { x:1, z:0 };
  const dist = Math.sqrt((fe.x-se.x)**2+(fe.z-se.z)**2);
  const ocs=dist*outChord, acs=dist*arrChord;
  
  for (let i=1;i<60;i++) {
    const tLin=i/60, t=tLin*tLin;
    const h00=2*t*t*t-3*t*t+1, h10=t*t*t-2*t*t+t, h01=-2*t*t*t+3*t*t, h11=t*t*t-t*t;
    const px=h00*se.x+h10*tang.x*ocs+h01*fe.x+h11*arr.x*acs;
    let pz=h00*se.z+h10*tang.z*ocs+h01*fe.z+h11*arr.z*acs;
    pz -= OFF*Math.sin(Math.PI*t);
    pts.push({x:px,z:pz,type:'outbound'});
  }
  
  // Flyby
  for(let i=0;i<60;i++){
    const a=Math.PI/2-(i/59)*Math.PI;
    pts.push({x:MD+LR*Math.cos(a),z:LR*Math.sin(a),type:'flyby'});
  }
  
  // Return Hermite
  const fx={x:MD,z:-LR}, ee={x:0,z:0};
  const dep={x:-1,z:0}, earr={x:-1,z:0};
  const rd=Math.sqrt((ee.x-fx.x)**2+(ee.z-fx.z)**2);
  const dcs=rd*0.8, aacs=rd*0.8;
  for(let i=1;i<=60;i++){
    const t=i/60;
    const h00=2*t*t*t-3*t*t+1,h10=t*t*t-2*t*t+t,h01=-2*t*t*t+3*t*t,h11=t*t*t-t*t;
    let px=h00*fx.x+h10*dep.x*dcs+h01*ee.x+h11*earr.x*aacs;
    let pz=h00*fx.z+h10*dep.z*dcs+h01*ee.z+h11*earr.z*aacs;
    pz+=OFF*Math.sin(Math.PI*t);
    pts.push({x:px,z:pz,type:'return'});
  }
  pts.push({x:-0.2,z:-0.3,type:'end'});
  return pts;
}

function draw(container, label, e1x,e1z, e2x,e2z, rev, outCh, arrCh) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  const canvas = document.createElement('canvas');
  canvas.width = 520; canvas.height = 280;
  const ctx = canvas.getContext('2d');
  
  const pts = build(e1x,e1z, e2x,e2z, rev, outCh, arrCh);
  
  const xMin=-8,xMax=48,zMin=-10,zMax=10;
  function toC(p){return{cx:(p.x-xMin)/(xMax-xMin)*canvas.width,cy:canvas.height-(p.z-zMin)/(zMax-zMin)*canvas.height};}
  
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,canvas.width,canvas.height);
  
  const e=toC({x:0,z:0});
  ctx.beginPath();ctx.arc(e.cx,e.cy,(ER/(xMax-xMin))*canvas.width,0,Math.PI*2);ctx.fillStyle='#224488';ctx.fill();
  const m=toC({x:MD,z:0});
  ctx.beginPath();ctx.arc(m.cx,m.cy,3,0,Math.PI*2);ctx.fillStyle='#999';ctx.fill();
  
  const colors = {spiral:'#44cc66',outbound:'#44cc66',flyby:'#4488ff',return:'#ff8844',end:'#ff8844'};
  let lastType = '';
  pts.forEach((p,i) => {
    if (p.type !== lastType) {
      if (lastType) ctx.stroke();
      ctx.strokeStyle=colors[p.type]||'#fff';
      ctx.lineWidth=p.type==='spiral'?1:1.5;
      ctx.beginPath();
      const{cx,cy}=toC(p);ctx.moveTo(cx,cy);
      lastType=p.type;
    } else {
      const{cx,cy}=toC(p);ctx.lineTo(cx,cy);
    }
  });
  ctx.stroke();
  
  cell.appendChild(canvas);
  const p=document.createElement('p');
  p.innerHTML=`<b>${label}</b><br>e1=(${e1x},${e1z}) e2=(${e2x.toFixed(2)},${e2z.toFixed(2)}) rev=${rev}`;
  cell.appendChild(p);
  container.appendChild(cell);
}

const c = document.getElementById('variants');
const ci = Math.cos(28.5*Math.PI/180), si = Math.sin(28.5*Math.PI/180);

// A: Current (e1=X, e2=Z)
draw(c,'A: Current (vertical orbits)', 1,0, 0,ci, 1.78, 0.6, 2.0);

// Rotate orbit plane: e1 tilted toward Z
draw(c,'B: 30° tilt', Math.cos(0.52),Math.sin(0.52), -Math.sin(0.52)*ci,Math.cos(0.52)*ci, 1.78, 0.6, 2.0);
draw(c,'C: 45° tilt', Math.cos(0.79),Math.sin(0.79), -Math.sin(0.79)*ci,Math.cos(0.79)*ci, 1.90, 0.6, 2.0);
draw(c,'D: 60° tilt', Math.cos(1.05),Math.sin(1.05), -Math.sin(1.05)*ci,Math.cos(1.05)*ci, 1.95, 0.6, 2.0);

// e1=Z, e2=X (fully horizontal)
draw(c,'E: Full horizontal (e1=Z)', 0,1, ci,0, 2.03, 0.6, 2.0);
draw(c,'F: Full horizontal rev=2.0', 0,1, ci,0, 2.00, 0.6, 2.0);
draw(c,'G: Full horizontal rev=1.98', 0,1, ci,0, 1.98, 0.6, 2.0);

// Partial rotations with adjusted rev
draw(c,'H: 40° tilt rev=1.85', Math.cos(0.70),Math.sin(0.70), -Math.sin(0.70)*ci,Math.cos(0.70)*ci, 1.85, 0.6, 2.0);
draw(c,'I: 40° tilt rev=1.88', Math.cos(0.70),Math.sin(0.70), -Math.sin(0.70)*ci,Math.cos(0.70)*ci, 1.88, 0.6, 2.0);
draw(c,'J: 50° tilt rev=1.92', Math.cos(0.87),Math.sin(0.87), -Math.sin(0.87)*ci,Math.cos(0.87)*ci, 1.92, 0.6, 2.0);

// Try with different chord scales
draw(c,'K: 45° rev=1.90 ch=0.4/1.5', Math.cos(0.79),Math.sin(0.79), -Math.sin(0.79)*ci,Math.cos(0.79)*ci, 1.90, 0.4, 1.5);
draw(c,'L: 60° rev=1.95 ch=0.4/1.5', Math.cos(1.05),Math.sin(1.05), -Math.sin(1.05)*ci,Math.cos(1.05)*ci, 1.95, 0.4, 1.5);

draw(c,'M: 45° rev=1.88', Math.cos(0.79),Math.sin(0.79), -Math.sin(0.79)*ci,Math.cos(0.79)*ci, 1.88, 0.6, 2.0);
draw(c,'N: 50° rev=1.90', Math.cos(0.87),Math.sin(0.87), -Math.sin(0.87)*ci,Math.cos(0.87)*ci, 1.90, 0.6, 2.0);
draw(c,'O: 35° rev=1.82', Math.cos(0.61),Math.sin(0.61), -Math.sin(0.61)*ci,Math.cos(0.61)*ci, 1.82, 0.6, 2.0);
draw(c,'P: 35° rev=1.85', Math.cos(0.61),Math.sin(0.61), -Math.sin(0.61)*ci,Math.cos(0.61)*ci, 1.85, 0.6, 2.0);
</script>
</body>
</html>
