<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Outbound → Flyby Entry Preview</title>
<style>
body { background: #111; color: #ccc; font-family: monospace; margin: 20px; }
h1 { color: #ff8844; }
canvas { border: 1px solid #333; margin: 5px; }
.row { display: flex; flex-wrap: wrap; gap: 10px; }
.cell { text-align: center; }
.cell p { font-size: 11px; color: #888; margin: 4px 0; }
</style>
</head>
<body>
<h1>Outbound → Flyby Entry Junction</h1>
<p>Zoomed to where the outbound line meets the Moon's flyby arc (top side).<br>
Green=outbound, Blue=flyby arc. Red dot=junction point. Dashed=flyby circle reference.</p>
<div class="row" id="variants"></div>

<script>
const MD = 40, INCL = 28.5 * Math.PI / 180, OFF = 2;

// Spiral end point (computed from rev=1.78)
const endAngle = 1.78 * 2 * Math.PI;
const spiralEnd = { x: -0.00, y: -0.87, z: -1.60 };
const spiralTangent = {
  x: -Math.sin(endAngle),
  y: Math.sin(INCL) * Math.cos(endAngle),
  z: Math.cos(INCL) * Math.cos(endAngle),
};
const tLen = Math.sqrt(spiralTangent.x**2 + spiralTangent.y**2 + spiralTangent.z**2);
spiralTangent.x /= tLen; spiralTangent.y /= tLen; spiralTangent.z /= tLen;

function buildOutbound(LR, chordScale, arrTangScale) {
  const flybyEntry = { x: MD, y: -0.05, z: +LR };
  const arrTang = { x: 1, y: 0, z: 0 }; // circle tangent at entry = +X
  const chord = Math.sqrt(
    (flybyEntry.x-spiralEnd.x)**2+(flybyEntry.y-spiralEnd.y)**2+(flybyEntry.z-spiralEnd.z)**2
  );
  const cs = chord * chordScale;
  const as = chord * arrTangScale;
  
  const pts = [];
  const N = 100;
  for (let i = 0; i <= N; i++) {
    const tLin = i / N;
    const t = tLin * tLin; // ease-in
    const h00 = 2*t*t*t - 3*t*t + 1;
    const h10 = t*t*t - 2*t*t + t;
    const h01 = -2*t*t*t + 3*t*t;
    const h11 = t*t*t - t*t;
    const px = h00*spiralEnd.x + h10*spiralTangent.x*cs + h01*flybyEntry.x + h11*arrTang.x*as;
    let pz = h00*spiralEnd.z + h10*spiralTangent.z*cs + h01*flybyEntry.z + h11*arrTang.z*as;
    pz -= OFF * Math.sin(Math.PI * t);
    pts.push({ x: px, z: pz });
  }
  return pts;
}

function buildFlyby(LR, nPts) {
  const pts = [];
  for (let i = 0; i < nPts; i++) {
    const a = Math.PI/2 - (i/(nPts-1)) * Math.PI;
    pts.push({ x: MD + LR*Math.cos(a), z: LR*Math.sin(a) });
  }
  return pts;
}

function drawVariant(container, label, LR, outChord, arrTangChord, flybyPts) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  const canvas = document.createElement('canvas');
  canvas.width = 380; canvas.height = 340;
  const ctx = canvas.getContext('2d');
  
  const outbound = buildOutbound(LR, outChord, arrTangChord);
  const flyby = buildFlyby(LR, flybyPts);
  
  // Viewport: zoomed to Moon's +Z junction
  const xMin = 30, xMax = 48, zMin = -2, zMax = 10;
  function toC(pt) {
    return {
      cx: (pt.x - xMin) / (xMax - xMin) * canvas.width,
      cy: canvas.height - (pt.z - zMin) / (zMax - zMin) * canvas.height,
    };
  }
  
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Grid
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 0.5;
  for (let x = xMin; x <= xMax; x++) {
    const {cx} = toC({x, z:0}); ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,canvas.height); ctx.stroke();
  }
  for (let z = zMin; z <= zMax; z++) {
    const {cy} = toC({x:0, z}); ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(canvas.width,cy); ctx.stroke();
  }
  
  // Flyby circle reference (dashed)
  const mc = toC({x: MD, z: 0});
  const rPx = (LR / (xMax-xMin)) * canvas.width;
  ctx.strokeStyle = '#333'; ctx.lineWidth = 0.5; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.arc(mc.cx, mc.cy, rPx, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  
  // Moon
  ctx.beginPath();
  ctx.arc(mc.cx, mc.cy, (0.273/(xMax-xMin))*canvas.width, 0, Math.PI*2);
  ctx.fillStyle = '#888'; ctx.fill();
  
  // Outbound (green) — last 40% only (near Moon)
  const outStart = Math.floor(outbound.length * 0.6);
  ctx.strokeStyle = '#44cc66'; ctx.lineWidth = 2; ctx.beginPath();
  for (let i = outStart; i < outbound.length; i++) {
    const {cx, cy} = toC(outbound[i]);
    i === outStart ? ctx.moveTo(cx, cy) : ctx.lineTo(cx, cy);
  }
  ctx.stroke();
  
  // Flyby arc (blue) — first half only
  const flyHalf = Math.ceil(flyby.length * 0.6);
  ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 2; ctx.beginPath();
  for (let i = 0; i < flyHalf; i++) {
    const {cx, cy} = toC(flyby[i]);
    i === 0 ? ctx.moveTo(cx, cy) : ctx.lineTo(cx, cy);
  }
  ctx.stroke();
  
  // Junction point
  const jp = toC({x: MD, z: LR});
  ctx.beginPath(); ctx.arc(jp.cx, jp.cy, 4, 0, Math.PI*2);
  ctx.fillStyle = '#ff4444'; ctx.fill();
  
  cell.appendChild(canvas);
  const p = document.createElement('p');
  p.innerHTML = `<b>${label}</b><br>LR=${LR} outCh=${outChord} arrCh=${arrTangChord} fly=${flybyPts}pts`;
  cell.appendChild(p);
  container.appendChild(cell);
}

const c = document.getElementById('variants');

// Current vs variations
drawVariant(c, 'A: Current (LR=4, ch=0.6/1.0, 60pt)', 4, 0.6, 1.0, 60);

// Vary arrival tangent chord scale (how much the outbound "aims" at +X near Moon)
drawVariant(c, 'B: arrCh=0.3', 4, 0.6, 0.3, 60);
drawVariant(c, 'C: arrCh=0.5', 4, 0.6, 0.5, 60);
drawVariant(c, 'D: arrCh=0.8', 4, 0.6, 0.8, 60);
drawVariant(c, 'E: arrCh=1.5', 4, 0.6, 1.5, 60);
drawVariant(c, 'F: arrCh=2.0', 4, 0.6, 2.0, 60);

// Vary flyby radius
drawVariant(c, 'G: LR=5 arrCh=0.5', 5, 0.6, 0.5, 60);
drawVariant(c, 'H: LR=5 arrCh=1.0', 5, 0.6, 1.0, 60);
drawVariant(c, 'I: LR=6 arrCh=0.5', 6, 0.6, 0.5, 60);
drawVariant(c, 'J: LR=6 arrCh=1.0', 6, 0.6, 1.0, 60);

// Vary outbound chord scale too
drawVariant(c, 'K: outCh=0.4 arrCh=0.5', 4, 0.4, 0.5, 60);
drawVariant(c, 'L: outCh=0.8 arrCh=0.5', 4, 0.8, 0.5, 60);
drawVariant(c, 'M: outCh=0.8 arrCh=0.8', 4, 0.8, 0.8, 60);
drawVariant(c, 'N: LR=5 outCh=0.8 arrCh=0.5', 5, 0.8, 0.5, 60);
drawVariant(c, 'O: LR=5 outCh=0.6 arrCh=0.3', 5, 0.6, 0.3, 60);
drawVariant(c, 'P: LR=6 outCh=0.6 arrCh=0.3', 6, 0.6, 0.3, 60);
</script>
</body>
</html>
