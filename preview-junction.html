<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Trajectory Junction Preview</title>
<style>
body { background: #111; color: #ccc; font-family: monospace; margin: 20px; }
h2 { color: #ff8844; margin-top: 30px; }
canvas { border: 1px solid #333; margin: 5px; cursor: crosshair; }
.row { display: flex; flex-wrap: wrap; gap: 10px; }
.cell { text-align: center; }
.cell p { font-size: 11px; color: #888; margin: 4px 0; }
.best { border-color: #ff8844 !important; }
</style>
</head>
<body>
<h1>Spiral → Outbound Junction Variants</h1>
<p>Top-down view (X=right→Moon, Z=up). Green=spiral, Orange=outbound. Zoomed to junction area.</p>
<div class="row" id="variants"></div>

<script>
const ER = 1, MD = 40, HA = 4, INCL = 28.5 * Math.PI / 180;
const LR = 4, OFF = 2;
const leoR = ER + 0.08;
const hSM = (ER + 0.3 + HA) / 2;
const hE = (HA - ER - 0.3) / (HA + ER + 0.3);

function buildSpiral(revolutions) {
  const pts = [];
  const totalAngle = revolutions * 2 * Math.PI;
  const N = 200;
  for (let i = 0; i < N; i++) {
    const f = i / (N - 1);
    const a = f * totalAngle;
    const bl = 1 / (1 + Math.exp(-(f - 0.30) / 0.12));
    const hl = (f - 0.30) * totalAngle;
    const rH = hSM * (1 - hE * hE) / (1 + hE * Math.cos(hl));
    const r = leoR + (rH - leoR) * bl;
    pts.push({
      x: Math.cos(a) * r,
      y: Math.sin(a) * r * Math.sin(INCL),
      z: Math.sin(a) * r * Math.cos(INCL),
    });
  }
  return pts;
}

function buildOutbound(spiralEnd, revolutions, chordScale, method) {
  const pts = [];
  const flybyEntry = { x: MD, y: -0.05, z: +LR };
  const endAngle = revolutions * 2 * Math.PI;
  const tx = -Math.sin(endAngle);
  const ty = Math.sin(INCL) * Math.cos(endAngle);
  const tz = Math.cos(INCL) * Math.cos(endAngle);
  const tLen = Math.sqrt(tx*tx + ty*ty + tz*tz);
  const tang = { x: tx/tLen, y: ty/tLen, z: tz/tLen };
  
  const arrTang = { x: 1, y: 0, z: 0 };
  const chord = Math.sqrt(
    (flybyEntry.x-spiralEnd.x)**2 +
    (flybyEntry.y-spiralEnd.y)**2 +
    (flybyEntry.z-spiralEnd.z)**2
  );
  const cs = chord * chordScale;

  const N = 100;
  for (let i = 1; i < N; i++) {
    const tLin = i / N;
    const t = method === 'ease' ? tLin * tLin : tLin;

    // Cubic Hermite
    const h00 = 2*t*t*t - 3*t*t + 1;
    const h10 = t*t*t - 2*t*t + t;
    const h01 = -2*t*t*t + 3*t*t;
    const h11 = t*t*t - t*t;

    const px = h00*spiralEnd.x + h10*tang.x*cs + h01*flybyEntry.x + h11*arrTang.x*cs;
    const py = h00*spiralEnd.y + h10*tang.y*cs + h01*flybyEntry.y + h11*arrTang.y*cs;
    let pz = h00*spiralEnd.z + h10*tang.z*cs + h01*flybyEntry.z + h11*arrTang.z*cs;
    pz -= OFF * Math.sin(Math.PI * t);
    pts.push({ x: px, y: py, z: pz });
  }
  return pts;
}

function drawVariant(container, label, revolutions, chordScale, method) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  
  const canvas = document.createElement('canvas');
  canvas.width = 400;
  canvas.height = 300;
  const ctx = canvas.getContext('2d');
  
  // Build data
  const spiral = buildSpiral(revolutions);
  const spiralEnd = spiral[spiral.length - 1];
  const outbound = buildOutbound(spiralEnd, revolutions, chordScale, method);
  
  // Viewport: zoom into junction area
  // X range: -5 to 15, Z range: -5 to 8
  const xMin = -5, xMax = 15, zMin = -5, zMax = 8;
  function toCanvas(pt) {
    return {
      cx: (pt.x - xMin) / (xMax - xMin) * canvas.width,
      cy: canvas.height - (pt.z - zMin) / (zMax - zMin) * canvas.height,
    };
  }
  
  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Grid
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 0.5;
  for (let x = xMin; x <= xMax; x += 2) {
    const { cx } = toCanvas({ x, z: 0 });
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
  }
  for (let z = zMin; z <= zMax; z += 2) {
    const { cy } = toCanvas({ x: 0, z });
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
  }
  
  // Earth
  const e = toCanvas({ x: 0, z: 0 });
  ctx.beginPath();
  ctx.arc(e.cx, e.cy, (ER / (xMax - xMin)) * canvas.width, 0, Math.PI * 2);
  ctx.fillStyle = '#224488';
  ctx.fill();
  
  // Draw spiral (last 100 points)
  ctx.strokeStyle = '#44cc66';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  const spiralStart = Math.max(0, spiral.length - 100);
  for (let i = spiralStart; i < spiral.length; i++) {
    const { cx, cy } = toCanvas(spiral[i]);
    if (i === spiralStart) ctx.moveTo(cx, cy);
    else ctx.lineTo(cx, cy);
  }
  ctx.stroke();
  
  // Draw outbound
  ctx.strokeStyle = '#ff8844';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < outbound.length; i++) {
    const { cx, cy } = toCanvas(outbound[i]);
    if (i === 0) ctx.moveTo(cx, cy);
    else ctx.lineTo(cx, cy);
  }
  ctx.stroke();
  
  // Junction point
  const jp = toCanvas(spiralEnd);
  ctx.beginPath();
  ctx.arc(jp.cx, jp.cy, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#ff4444';
  ctx.fill();
  
  // Tangent line at junction
  const tang = {
    x: -Math.sin(revolutions * 2 * Math.PI),
    z: Math.cos(INCL) * Math.cos(revolutions * 2 * Math.PI),
  };
  const tp = toCanvas({ x: spiralEnd.x + tang.x * 3, z: spiralEnd.z + tang.z * 3 });
  ctx.strokeStyle = '#ff444466';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(jp.cx, jp.cy);
  ctx.lineTo(tp.cx, tp.cy);
  ctx.stroke();
  ctx.setLineDash([]);
  
  cell.appendChild(canvas);
  
  const p = document.createElement('p');
  p.innerHTML = `<b>${label}</b><br>rev=${revolutions} chord=${chordScale} ${method}`;
  cell.appendChild(p);
  
  container.appendChild(cell);
}

const container = document.getElementById('variants');

// Vary revolutions
drawVariant(container, 'A: rev=1.75 (baseline)', 1.75, 1.0, 'ease');
drawVariant(container, 'B: rev=1.78 (current)', 1.78, 1.0, 'ease');
drawVariant(container, 'C: rev=1.80', 1.80, 1.0, 'ease');
drawVariant(container, 'D: rev=1.82', 1.82, 1.0, 'ease');

// Vary chord scale at rev=1.78
drawVariant(container, 'E: chord=0.6', 1.78, 0.6, 'ease');
drawVariant(container, 'F: chord=0.8', 1.78, 0.8, 'ease');
drawVariant(container, 'G: chord=1.2', 1.78, 1.2, 'ease');
drawVariant(container, 'H: chord=1.5', 1.78, 1.5, 'ease');

// Vary rev + chord combos
drawVariant(container, 'I: rev=1.80 ch=0.8', 1.80, 0.8, 'ease');
drawVariant(container, 'J: rev=1.80 ch=1.2', 1.80, 1.2, 'ease');
drawVariant(container, 'K: rev=1.82 ch=0.8', 1.82, 0.8, 'ease');
drawVariant(container, 'L: rev=1.82 ch=1.2', 1.82, 1.2, 'ease');

// Linear vs ease-in
drawVariant(container, 'M: rev=1.78 linear', 1.78, 1.0, 'linear');
drawVariant(container, 'N: rev=1.80 linear', 1.80, 1.0, 'linear');
drawVariant(container, 'O: rev=1.80 ch=0.8 linear', 1.80, 0.8, 'linear');
drawVariant(container, 'P: rev=1.78 ch=0.8 linear', 1.78, 0.8, 'linear');
</script>
</body>
</html>
